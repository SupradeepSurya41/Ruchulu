<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dashboard — Ruchulu 🥄</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="navbar">
  <a href="../index.html" class="nav-brand">Ruchulu 🥄</a>
  <ul class="nav-links" id="nav-links">
    <li><a href="search.html">Find Caterers</a></li>
    <li><a href="dashboard.html" style="color:var(--brown)">My Bookings</a></li>
  </ul>
  <div class="nav-auth" id="nav-auth"></div>
  <button class="hamburger"><span></span><span></span><span></span></button>
</nav>

<div class="page-header">
  <div class="container" style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1rem">
    <div>
      <h1 id="welcome-name">My Dashboard</h1>
      <p>Manage your bookings and account</p>
    </div>
    <a href="search.html" class="btn btn-gold">+ New Booking</a>
  </div>
</div>

<section class="section" style="padding-top:2rem">
  <div class="container">

    <!-- Stats row -->
    <div class="grid-2" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr));margin-bottom:2rem" id="stats-row">
      <div class="card"><div class="card-body" style="text-align:center">
        <div style="font-size:2rem;font-family:'Playfair Display',serif;color:var(--brown)" id="stat-total">—</div>
        <div style="font-size:.85rem;color:var(--text-lt)">Total Bookings</div>
      </div></div>
      <div class="card"><div class="card-body" style="text-align:center">
        <div style="font-size:2rem;font-family:'Playfair Display',serif;color:var(--gold)" id="stat-pending">—</div>
        <div style="font-size:.85rem;color:var(--text-lt)">Pending</div>
      </div></div>
      <div class="card"><div class="card-body" style="text-align:center">
        <div style="font-size:2rem;font-family:'Playfair Display',serif;color:var(--success)" id="stat-confirmed">—</div>
        <div style="font-size:.85rem;color:var(--text-lt)">Confirmed</div>
      </div></div>
      <div class="card"><div class="card-body" style="text-align:center">
        <div style="font-size:2rem;font-family:'Playfair Display',serif;color:var(--brown-lt)" id="stat-completed">—</div>
        <div style="font-size:.85rem;color:var(--text-lt)">Completed</div>
      </div></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="all" onclick="filterBookings('all')">All</button>
      <button class="tab-btn" data-tab="pending" onclick="filterBookings('PENDING')">Pending</button>
      <button class="tab-btn" data-tab="confirmed" onclick="filterBookings('CONFIRMED')">Confirmed</button>
      <button class="tab-btn" data-tab="completed" onclick="filterBookings('COMPLETED')">Completed</button>
      <button class="tab-btn" data-tab="cancelled" onclick="filterBookings('CANCELLED')">Cancelled</button>
    </div>

    <div id="bookings-list"><div class="loading-wrap"><div class="spinner"></div></div></div>
  </div>
</section>

<!-- BOOKING DETAIL MODAL -->
<div class="modal-overlay" id="modal-booking">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <h3>Booking Details</h3>
      <button class="modal-close" onclick="closeModal('modal-booking')">×</button>
    </div>
    <div class="modal-body" id="booking-detail-body"></div>
    <div class="modal-footer" id="booking-detail-actions"></div>
  </div>
</div>

<!-- CANCEL MODAL -->
<div class="modal-overlay" id="modal-cancel">
  <div class="modal">
    <div class="modal-header">
      <h3>Cancel Booking</h3>
      <button class="modal-close" onclick="closeModal('modal-cancel')">×</button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:1rem">Are you sure? Cancellations within 24h of the event may not be refunded.</p>
      <div class="form-group">
        <label class="form-label">Reason for cancellation</label>
        <textarea class="form-control" id="cancel-reason" rows="3" placeholder="Please let the caterer know why you're cancelling..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-cancel')">Keep Booking</button>
      <button class="btn btn-danger" id="btn-confirm-cancel" onclick="confirmCancel()">Cancel Booking</button>
    </div>
  </div>
</div>

<div class="toast-container"></div>
<script src="../api-config.js"></script>
<script src="../js/api.js"></script>
<script>
let allBookings = [];
let selectedBookingId = null;

async function init() {
  if (!Auth.isLoggedIn()) {
    toast('Please sign in to view your dashboard.', 'error');
    setTimeout(() => window.location.href = '../index.html', 1200); return;
  }
  const user = Auth.getUser();
  if (user) document.getElementById('welcome-name').textContent = `Welcome, ${user.firstName || 'back'} 👋`;
  loadBookings();
}

async function loadBookings() {
  try {
    const res = await API.getMyBookings();
    allBookings = res.data?.content || res.data || res || [];
    renderBookings(allBookings);
    updateStats(allBookings);
  } catch (e) {
    // Demo data
    allBookings = [
      {id:'bk-001',catererId:'cat-001',catererName:'Lakshmi Catering Services',occasion:'WEDDING',eventDate:'2025-12-20',eventCity:'Hyderabad',guestCount:500,totalAmount:175000,advanceAmount:35000,status:'CONFIRMED',paymentStatus:'ADVANCE_PAID',createdAt:'2025-11-01'},
      {id:'bk-002',catererId:'cat-002',catererName:'Royal Feast Caterers',occasion:'BIRTHDAY',eventDate:'2025-12-28',eventCity:'Hyderabad',guestCount:100,totalAmount:45000,advanceAmount:9000,status:'PENDING',paymentStatus:'UNPAID',createdAt:'2025-11-10'},
    ];
    renderBookings(allBookings);
    updateStats(allBookings);
  }
}

function updateStats(bookings) {
  document.getElementById('stat-total').textContent = bookings.length;
  document.getElementById('stat-pending').textContent = bookings.filter(b=>b.status==='PENDING').length;
  document.getElementById('stat-confirmed').textContent = bookings.filter(b=>b.status==='CONFIRMED').length;
  document.getElementById('stat-completed').textContent = bookings.filter(b=>b.status==='COMPLETED').length;
}

function filterBookings(status) {
  // Update tab active state
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const filtered = status === 'all' ? allBookings : allBookings.filter(b => b.status === status);
  renderBookings(filtered);
}

function renderBookings(bookings) {
  const el = document.getElementById('bookings-list');
  if (!bookings.length) {
    el.innerHTML = `<div class="empty-state"><span class="empty-icon">📅</span><h3>No bookings found</h3><p>Ready to plan your next event?</p><a href="search.html" class="btn btn-primary" style="margin-top:1rem">Find a Caterer</a></div>`;
    return;
  }
  el.innerHTML = bookings.map(b => `
    <div class="card" style="margin-bottom:1rem;cursor:pointer" onclick="openBooking('${b.id}')">
      <div class="card-body" style="padding:1.25rem">
        <div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:.75rem">
          <div>
            <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem">
              <h3 style="font-size:1rem;margin:0">${b.catererName}</h3>
              ${statusBadge(b.status)}
            </div>
            <div style="display:flex;gap:1.5rem;flex-wrap:wrap">
              <span style="font-size:.85rem;color:var(--text-lt)">🎉 ${b.occasion?.replace(/_/g,' ')}</span>
              <span style="font-size:.85rem;color:var(--text-lt)">📅 ${formatDate(b.eventDate)}</span>
              <span style="font-size:.85rem;color:var(--text-lt)">📍 ${b.eventCity}</span>
              <span style="font-size:.85rem;color:var(--text-lt)">👥 ${b.guestCount} guests</span>
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--brown);font-weight:600">${formatCurrency(b.totalAmount)}</div>
            <div style="font-size:.78rem;color:var(--text-lt)">${b.paymentStatus?.replace(/_/g,' ')}</div>
          </div>
        </div>
      </div>
    </div>`).join('');
}

async function openBooking(id) {
  selectedBookingId = id;
  showModal('modal-booking');
  document.getElementById('booking-detail-body').innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';
  try {
    const res = await API.getBooking(id);
    const b = res.data || res;
    renderBookingDetail(b);
  } catch {
    const b = allBookings.find(x => x.id === id);
    if (b) renderBookingDetail(b);
  }
}

function renderBookingDetail(b) {
  document.getElementById('booking-detail-body').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem">
      <div><div style="font-size:.8rem;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px">Caterer</div><div style="font-weight:600">${b.catererName}</div></div>
      <div><div style="font-size:.8rem;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px">Status</div>${statusBadge(b.status)}</div>
      <div><div style="font-size:.8rem;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px">Occasion</div><div style="font-weight:600">${b.occasion?.replace(/_/g,' ')}</div></div>
      <div><div style="font-size:.8rem;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px">Event Date</div><div style="font-weight:600">${formatDate(b.eventDate)}</div></div>
      <div><div style="font-size:.8rem;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px">City</div><div style="font-weight:600">${b.eventCity}</div></div>
      <div><div style="font-size:.8rem;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px">Guests</div><div style="font-weight:600">${b.guestCount}</div></div>
      <div><div style="font-size:.8rem;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px">Total Amount</div><div style="font-weight:600;color:var(--brown)">${formatCurrency(b.totalAmount)}</div></div>
      <div><div style="font-size:.8rem;color:var(--text-lt);text-transform:uppercase;letter-spacing:.5px">Payment</div><div style="font-weight:600">${b.paymentStatus?.replace(/_/g,' ')}</div></div>
    </div>
    ${b.specialRequests ? `<div style="background:var(--cream-dk);border-radius:var(--radius-sm);padding:1rem;margin-bottom:1rem"><strong>Special Requests:</strong> ${b.specialRequests}</div>` : ''}
    ${b.catererNotes ? `<div style="background:var(--cream-dk);border-radius:var(--radius-sm);padding:1rem"><strong>Caterer Notes:</strong> ${b.catererNotes}</div>` : ''}`;

  const actions = document.getElementById('booking-detail-actions');
  actions.innerHTML = '';
  if (b.status === 'PENDING' || b.status === 'CONFIRMED') {
    const btn = document.createElement('button');
    btn.className = 'btn btn-danger';
    btn.textContent = 'Cancel Booking';
    btn.onclick = () => { closeModal('modal-booking'); showModal('modal-cancel'); };
    actions.appendChild(btn);
  }
  if (b.status === 'CONFIRMED' && b.paymentStatus === 'UNPAID') {
    const btn = document.createElement('button');
    btn.className = 'btn btn-success';
    btn.textContent = `💰 Pay Advance ${formatCurrency(b.advanceAmount)}`;
    btn.onclick = () => toast('Payment gateway integration coming soon!', 'info');
    actions.appendChild(btn);
  }
  if (b.status === 'COMPLETED') {
    const btn = document.createElement('button');
    btn.className = 'btn btn-gold';
    btn.textContent = '⭐ Leave Review';
    btn.onclick = () => toast('Review feature coming soon!', 'info');
    actions.appendChild(btn);
  }
}

async function confirmCancel() {
  const reason = document.getElementById('cancel-reason').value.trim();
  if (!reason) { toast('Please enter a reason for cancellation.', 'error'); return; }
  const btn = document.getElementById('btn-confirm-cancel');
  setLoading(btn, true);
  try {
    await API.cancelBooking(selectedBookingId, reason);
    toast('Booking cancelled successfully.', 'success');
    closeModal('modal-cancel');
    loadBookings();
  } catch (e) {
    toast(e.message || 'Failed to cancel booking.', 'error');
  } finally { setLoading(btn, false); }
}

init();
</script>
</body>
</html>
